apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: mytg
data:
  nginx.conf: |
    events {}

    http {
        upstream tomcat_backend {
            server tom-svc:8080;
        }

        server {
            listen 80;

            location / {
                proxy_set_header Host $host;
                proxy_pass http://tomcat_backend;
            }
        }
    }
